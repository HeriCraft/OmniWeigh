name: Build and Package OmniWeigh Release

on:
  push:
    branches:
      - master

jobs:
  build-and-package:
    runs-on: windows-latest

    # Accorde les permissions d'écriture pour que le workflow puisse pousser le tag Git
    permissions:
      contents: write

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET 10 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    # 1. Extraction de la version depuis le fichier OmniWeigh.Desktop.csproj
    - name: Extract Project Version
      id: get_version
      shell: pwsh
      run: |
        $csprojPath = "OmniWeigh.Desktop/OmniWeigh.Desktop.csproj"
        [xml]$xml = Get-Content $csprojPath
        $version = $xml.Project.PropertyGroup.Version
        if (-not $version) { $version = "1.0.0" }
        echo "PROJECT_VERSION=$version" >> $env:GITHUB_OUTPUT

    # 2. Restauration des packages NuGet
    - name: Restore NuGet Packages
      run: dotnet restore OmniWeigh.slnx

    # 3. Publication de l'application (cible OmniWeigh.Desktop)
    - name: Publish Application
      run: |
        dotnet publish OmniWeigh.Desktop/OmniWeigh.Desktop.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:PublishReadyToRun=true `
          -o ./publish/OmniWeigh-Release

    # 4. Compression du livrable avec le numéro de version extrait
    - name: Package Artifact
      shell: pwsh
      run: |
        $ver = "${{ steps.get_version.outputs.PROJECT_VERSION }}"
        Compress-Archive -Path ./publish/OmniWeigh-Release/* -DestinationPath ./OmniWeigh-v$ver-win-x64.zip

    # 5. Téléversement du ZIP dans les artefacts GitHub Actions
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OmniWeigh-v${{ steps.get_version.outputs.PROJECT_VERSION }}-win-x64
        path: OmniWeigh-v${{ steps.get_version.outputs.PROJECT_VERSION }}-win-x64.zip
        retention-days: 30

    # 6. Création et push dynamique du tag Git si la version change
    - name: Create and Push Git Tag
      shell: pwsh
      run: |
        $tag = "v${{ steps.get_version.outputs.PROJECT_VERSION }}"
        
        # Vérifie si le tag existe déjà sur le dépôt
        $tagExists = git tag -l $tag
        if (-not $tagExists) {
          write-host "Creating new tag: $tag"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git tag $tag
          git push origin $tag
        } else {
          write-host "Tag $tag already exists. Skipping tag creation."
        }